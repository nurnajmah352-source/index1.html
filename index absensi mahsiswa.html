<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi Mahasiswa</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #007BFF;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            width: 80%;
            margin: auto;
            margin-top: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        table, th, td {
            border: 1px solid #ccc;
        }
        th, td {
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h2>Sistem Informasi Absensi Mahasiswa</h2>
</header>

<div class="container">

    <!-- Login -->
    <div class="card">
        <h3>Login</h3>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

    <!-- Input Absensi -->
    <div class="card">
        <h3>Input Absensi</h3>
        <input type="text" placeholder="Nama Mahasiswa">
        <input type="text" placeholder="NIM">
        <select>
            <option>Pilih Status</option>
            <option>Hadir</option>
            <option>Izin</option>
            <option>Sakit</option>
            <option>Alpa</option>
        </select>
        <button>Simpan Absensi</button>
    </div>

    <!-- Data Absensi -->
    <div class="card">
        <h3>Data Absensi</h3>
        <table>
            <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Status</th>
                <th>Tanggal</th>
            </tr>
            <tr>
                <td>Nur Najma</td>
                <td>2422080028</td>
                <td>Hadir</td>
                <td>29-04-2026</td>
            </tr>
        </table>
    </div>

</div>

</body>
</html>
